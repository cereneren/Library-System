<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="mb-1">Recommended Books</h3>
      <p class="text-muted mb-0">
        These recommendations are generated based on your previous ratings.
        If there is not enough data, general books are shown.
      </p>
    </div>

    <button class="btn btn-outline-primary btn-sm" type="button" (click)="loadRecommendations()">
      Refresh
    </button>
  </div>

  <div *ngIf="recommendationsLoading" class="text-muted">
    Loading recommendations...
  </div>

  <div *ngIf="recommendationsError" class="alert alert-danger">
    {{ recommendationsError }}
  </div>

  <div *ngIf="!recommendationsLoading && !recommendationsError && recommendedBooks.length === 0" class="text-muted">
    No recommendations available yet.
  </div>

  <app-book-overview
    *ngIf="!recommendationsLoading && !recommendationsError && recommendedBooks.length > 0"
    [externalBooks]="recommendedBooks"
    [hideHeader]="true">
  </app-book-overview>
</div>
